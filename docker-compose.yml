version: '3.8'

services:
  # Backend Node.js
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      OLLAMA_URL: http://ollama:11434
      MODEL: gemma3:4b
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - chatbot-network
    volumes:
      - ./src:/app/src

  # Ollama para LLM
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - chatbot-network
    environment:
      - OLLAMA_NUM_GPU=1

volumes:
  ollama_data:
    driver: local

networks:
  chatbot-network:
    driver: bridge
